<div>
    <div style="margin: 0 auto 32px;">
        <h1 >Games</h1>
        <input type="checkbox" onclick="toggleVisibility()" id="modCheckbox">
        <label for="modCheckbox">Show Mods</label>
    </div>
    <div class="flex-grid">
        <div class="gamesCol modCover">
            <a href="karlsonmultiplayerbut1000xbetter">
                <img src="/images/karlsonBetterKeyart.png" alt="Karlson Multiplayer but 1000x better Keyart" id="karlsonBetterKeyart" class="gameCover">
                <div style="position: relative;">
                    <img src="/images/karlsonBetterTextLogo.png" alt="Karlson Multiplayer but 1000x better Text Logo" id="karlsonBetterTextLogo" class="gameCoverText">
                </div>
            </a>
        </div>
        <div class="gamesCol">
            <a href="tacticaldeathmatch">
                <img src="/images/tacticalDeathmatchArt1.png" alt="Tactical Deathmatch Keyart" id="tacticalDeathmatchKeyart" class="gameCover">
                <div style="position: relative;">
                    <img src="/images/tacticalDeathmatchTextLogo.png" alt="Tactical Deathmatch Text Logo" id="tacticalDeathmatchTextLogo" class="gameCoverText">
                </div>
            </a>
        </div>
        <div class="gamesCol modCover">
            <a href="morecombat">
                <img src="/images/moreCombatKeyart.png" alt="More Combat Keyart" id="moreCombatKeyart" class="gameCover">
            </a>
        </div>
        <div class="gamesCol">
            <a href="dash">
                <img src="/images/dashKeyart.png" alt="Dash Keyart" id="dashKeyart" class="gameCover">
            </a>
        </div>
    </div>
</div>

<script>
    function toggleVisibility() {
        const checkbox = document.getElementById("modCheckbox");
        const modCovers = document.querySelectorAll(".modCover");
        
        if (checkbox.checked) {
            modCovers.forEach(element => {
                element.style.display = "block";
            });
        } else {
            modCovers.forEach(element => {
                element.style.display = "none";
            });
        }
    }
</script>

<script>
    jQuery(document).ready(function () {
        console.log("Games page loaded.");
        jQuery('.gamesCol a').on('click', function(e) {
            e.preventDefault();
            link_to = $(this).attr('href');
            const gameCover = $(this).children()[0];
            const gameLink = $(this)[0];
            const rect = gameCover.getBoundingClientRect();
            const absoluteTop = rect.top + window.scrollY;
            const absoluteLeft = rect.left + window.scrollX;
            const placeholder = document.createElement('div');
            const textLogo = $(this)[0].querySelector('.gameCoverText');
            console.log(textLogo);

            placeholder.style.width = `${rect.width}px`;
            placeholder.style.height = `${rect.height}px`;
            placeholder.style.flexShrink = '0';
            placeholder.style.flexGrow = window.getComputedStyle(gameCover).flexGrow;
            gameCover.style.width = `${rect.width}px`;
            gameCover.style.height = `${rect.height}px`;
            gameCover.style.top = `${absoluteTop - 81}px `;
            gameLink.insertBefore(placeholder, gameCover);
            if (textLogo !== null)
            {
                textLogo.style.display = 'unset';
            }
            gameCover.style.position = 'absolute';
            if (gameCover.id == "tacticalDeathmatchKeyart")
            {
                gameCover.style.content = 'url("/images/tacticalDeathmatchArt1NoText.png")';
            }else if (gameCover.id == "karlsonBetterKeyart")
            {
                gameCover.style.content = 'url("/images/karlsonBetterKeyartNoText.png")';
            }

            gsap.to($(this), {
                marginBottom: "50vw",
                duration: 0.5,
                ease: "linear",
            })

            gsap.to($(gameCover), {
                marginRight: "auto",
                marginLeft: "calc(50% - 50vw)",
                width: "100vw",
                left: 0,
                right: 0,
                textAlign: "center",
                top: `${window.scrollY - 82}px`,
                maxWidth: "unset",
                height: "56.25vw",
                outline: "0px solid transparent",
                borderRadius: "0px",
                ease: "power3.out",
                duration: 0.4,
            })
            if (textLogo !== null && gameCover.id == "tacticalDeathmatchKeyart")
            {
                gsap.to($(textLogo), {
                    left: `${(window.innerWidth / 2) - ((window.innerWidth / 100) * 20)}px`,
                    maxWidth: "unset",
                    width: "40vw",
                    duration: 0.4,
                    margin: 0,
                    bottom: "8.7vw",
                })

                gsap.to($(this).children()[2], {
                    top: `${($(this).children()[2].getBoundingClientRect().y * -1) + ((window.innerWidth / 100) * 56.25)}px`,
                    left: `${$(this).children()[2].getBoundingClientRect().x * -1}px`,
                    duration: 0.4,
                })
            }else if (textLogo !== null && gameCover.id == "karlsonBetterKeyart")
            {
                gsap.to($(textLogo), {
                    left: `${(window.innerWidth / 2) - ((window.innerWidth / 100) * 22.5)}px`,
                    maxWidth: "unset",
                    width: "45vw",
                    duration: 0.4,
                    margin: 0,
                    bottom: "6.5vw",
                })

                gsap.to($(this).children()[2], {
                    top: `${($(this).children()[2].getBoundingClientRect().y * -1) + ((window.innerWidth / 100) * 56.25)}px`,
                    left: `${$(this).children()[2].getBoundingClientRect().x * -1}px`,
                    duration: 0.4,
                })
            }
            gsap.to($(gameCover), {
                duration: 0.5,
                onComplete: openLink,
            })
        });
    });

    function openLink (){
        window.location.href = link_to;
    }
</script>
