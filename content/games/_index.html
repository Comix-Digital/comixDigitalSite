<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<div>
    <div id="heroContent">
        <div id="heroDiv">
            <img src="/comixDigitalSite/images/tilingLogoBGWhite.png" alt="Hero Image" id="heroImage">
            <h1 id="heroTitle">These are the games.</h1>
            <h3 id="heroSubtitle">You are still gay!</h3>
        </div>
    </div>
    <div class="flex-grid">
        <div class="gamesCol">
            <a href="tacticaldeathmatch">
                <img src="/comixDigitalSite/images/tacticalDeathmatchArt1.png" alt="Tactical Deathmatch Keyart" id="tacticalDeathmatchKeyart" class="gameCover">
                <div style="position: relative;">
                    <img src="/comixDigitalSite/images/tacticalDeathmatchTextLogo.png" alt="Tactical Deathmatch Text Logo" id="tacticalDeathmatchTextLogo" class="gameCoverText">
                </div>
            </a>
        </div>
        <div class="gamesCol">
            <a href="morecombat">
                <img src="/comixDigitalSite/images/moreCombatKeyart.png" alt="More Combat Keyart" id="moreCombatKeyart" class="gameCover">
            </a>
        </div>
        <div class="gamesCol">
            <a href="dash">
                <img src="/comixDigitalSite/images/dashKeyart.png" alt="Dash Keyart" id="dashKeyart" class="gameCover">
            </a>
        </div>
    </div>
</div>

<script>
    const entries = performance.getEntriesByType("navigation");
    entries.forEach((entry) => {
    if (entry.type === "back_forward") {
        console.log(`${entry.name} was navigated back to!`);
        console.log(entry);
        location.reload(true);
    }
    });

    jQuery(document).ready(function () {
        console.log("Games page loaded.");
        jQuery('.gamesCol a').on('click', function(e) {
            e.preventDefault();
            link_to = $(this).attr('href');
            const gameCover = $(this).children()[0];
            const gameLink = $(this)[0];
            const rect = gameCover.getBoundingClientRect();
            const absoluteTop = rect.top + window.scrollY;
            const absoluteLeft = rect.left + window.scrollX;
            const placeholder = document.createElement('div');
            const textLogo = $(this)[0].querySelector('.gameCoverText');

            placeholder.style.width = `${rect.width}px`;
            placeholder.style.height = `${rect.height}px`;
            placeholder.style.flexShrink = '0';
            placeholder.style.flexGrow = window.getComputedStyle(gameCover).flexGrow;
            gameCover.style.width = `${rect.width}px`;
            gameCover.style.height = `${rect.height}px`;
            gameCover.style.top = `${absoluteTop - 81}px `;
            gameLink.insertBefore(placeholder, gameCover);
            textLogo.style.display = 'unset';
            gameCover.style.position = 'absolute';
            gameCover.style.content = 'url("/comixDigitalSite/images/tacticalDeathmatchArt1NoText.png")';
            console.log($(this).children()[2].tagName);
            console.log($(this).children()[2].getBoundingClientRect().x);

            gsap.to($(this), {
                marginBottom: "50vw",
                duration: 0.5,
                ease: "linear",
            })

            gsap.to($(gameCover), {
                marginRight: "auto",
                marginLeft: "calc(50% - 50vw)",
                width: "100vw",
                left: 0,
                right: 0,
                textAlign: "center",
                top: `${window.scrollY - 82}px`,
                maxWidth: "unset",
                height: "56.25vw",
                outline: "0px solid transparent",
                borderRadius: "0px",
                ease: "power3.out",
                duration: 0.4,
            })
            
            gsap.to($(textLogo), {
                left: `${(window.innerWidth / 2) - ((window.innerWidth / 100) * 20)}px`,
                maxWidth: "unset",
                width: "40vw",
                duration: 0.4,
                margin: 0,
                bottom: "8.7vw",
            })

            gsap.to($(this).children()[2], {
                top: `${($(this).children()[2].getBoundingClientRect().y * -1) + ((window.innerWidth / 100) * 56.25)}px`,
                left: `${$(this).children()[2].getBoundingClientRect().x * -1}px`,
                duration: 0.4,
            })

            gsap.to($(gameCover), {
                duration: 0.5,
                onComplete: openLink,
            })
        });
    });

    function openLink (){
        window.location.href = link_to;
    }
</script>
