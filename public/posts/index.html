</a><script>
    
    let menuHidden = true;
    let b = document.querySelector("#menu-trigger")
    let m = document.querySelector(".menu")
    b.addEventListener("click", function () {
        if (menuHidden) {
            gsap.to("#menu-trigger-icon line", {
                opacity: 0,
                duration: "0.05",
            });
            m.classList.toggle("hidden")
            gsap.to("#menu-trigger-icon", {
                width: m.getBoundingClientRect().width,
                height: m.getBoundingClientRect().height,
                duration: 0.2,
                ease: "power3.out",
            });
            gsap.to("#menu-trigger", {
                top: "10px",
                duration: 0.2,
                ease: "power3.out",
            });
            gsap.to("#menu-trigger", {
                display: "none",
                duration: 0,
                delay: 0.2,
            });
            gsap.to(".menu", {
                opacity: "100%",
                duration: 0,
                delay: 0.2,
            });
            menuHidden = false;
        }
    });
    
    document.body.addEventListener('click', function (event) {
        if (!b.contains(event.target)) {
            if (!menuHidden) {
                gsap.to(".menu", {
                    opacity: "0%",
                    duration: 0,
                });
                gsap.to("#menu-trigger", {
                    display: "block",
                    duration: 0,
                });
                gsap.to("#menu-trigger", {
                    top: "8px",
                    duration: 0.2,
                    ease: "power3.out",
                });
                gsap.to("#menu-trigger-icon", {
                    width: "40px",
                    height: "40px",
                    duration: 0.2,
                    ease: "power3.out",

                });
                m.classList.toggle("hidden")
                gsap.to("#menu-trigger-icon line", {
                    opacity: "100%",
                    duration: "0.1",
                    delay: 0.1,
                });
                menuHidden = true;
            }
        }
    });
    
</script>

<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
